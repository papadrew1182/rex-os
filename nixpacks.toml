# Nixpacks build config for Rex OS backend on Railway.
#
# Backend lives in backend/ subdir but Railway runs from repo root.
# This file tells Nixpacks how to install Python deps and start the
# FastAPI app from the right location.
#
# We install deps into the system Python (not a venv) so uvicorn lands
# on the system PATH. The start command in railway.json is the source
# of truth for how the app actually launches.

[phases.setup]
nixPkgs = ["python312", "gcc"]

[phases.install]
cmds = ["python -m pip install --upgrade pip && pip install -r backend/requirements.txt"]

[start]
cmd = "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
