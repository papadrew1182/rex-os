# Nixpacks build config for Rex OS backend on Railway.
#
# Backend lives in backend/ subdir but Railway runs from repo root.
# This file tells Nixpacks how to install Python deps and start the
# FastAPI app from the right location.
#
# We use a venv at backend/.venv because Nix-managed Python doesn't
# ship with pip. python -m venv bootstraps pip automatically.
# railway.json's startCommand must use the same .venv/bin/uvicorn path.

[phases.setup]
nixPkgs = ["python312", "gcc"]
# greenlet (a SQLAlchemy async dependency) is loaded as a C extension that
# dynamically links libstdc++.so.6 at runtime. Nix-managed Python doesn't
# bundle it, so we add stdenv.cc.cc.lib at runtime via LD_LIBRARY_PATH
# in the start command.
aptPkgs = ["libstdc++6"]

[phases.install]
cmds = ["cd backend && python -m venv .venv && .venv/bin/pip install --upgrade pip && .venv/bin/pip install -r requirements.txt"]

[start]
cmd = "cd backend && .venv/bin/uvicorn main:app --host 0.0.0.0 --port $PORT"
