[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = session
asyncio_default_test_loop_scope = session
markers =
    live_db: Session 1 live-Postgres merge gate. Requires a reachable DATABASE_URL pointing at a dev Postgres. Skipped automatically when the DB is unreachable so the default test suite stays hermetic.
    live_anthropic: Session 1 optional live Anthropic proof. Requires ANTHROPIC_API_KEY and network access. Never runs by default. Makes one small billed streaming call (~50 tokens). Not a merge gate.
