name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

# One active run per branch is plenty; cancel stale runs on new pushes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Silence the "Node.js 20 actions are deprecated" warning that GitHub now
# prints for checkout@v4 / setup-python@v5 / setup-node@v4. Forces those
# actions to run on Node 24, which they already support.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  backend:
    name: Backend — pytest + migrations
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: rex
          POSTGRES_PASSWORD: rex
          POSTGRES_DB: rex_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U rex"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://rex:rex@localhost:5432/rex_ci
      REX_MIGRATIONS_DIR: ${{ github.workspace }}/migrations
      REX_STORAGE_BACKEND: local
      REX_STORAGE_PATH: ${{ github.workspace }}/backend_storage_ci
      ENVIRONMENT: test
      LOG_LEVEL: WARNING

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Wait for Postgres
        run: |
          for i in {1..30}; do
            pg_isready -h localhost -p 5432 -U rex && break
            sleep 1
          done

      - name: Apply migrations (schema + foundation seed)
        working-directory: backend
        run: python -m app.migrate

      - name: Run pytest
        working-directory: backend
        run: pytest -q --maxfail=5 --disable-warnings

  frontend:
    name: Frontend — vite build + lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint
        continue-on-error: true  # lint errors don't block builds (yet)

      - name: Build
        working-directory: frontend
        run: npm run build
