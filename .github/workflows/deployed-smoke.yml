name: Deployed Smoke

# Manual / scheduled smoke of a deployed Rex OS. Separate from the main CI
# workflow because it talks to a real running backend + frontend. Uses the
# browser smoke (Playwright) plus the backend proxy/redirect regression
# checks against the deployed URL.
#
# Trigger manually from the Actions tab and supply `deployed_url`:
#   https://rex-os.up.railway.app
# or the Vercel preview.
on:
  workflow_dispatch:
    inputs:
      deployed_url:
        description: 'Deployed URL to smoke (e.g. https://rex-os.up.railway.app)'
        required: true
        type: string
  schedule:
    # Every 6h against the production target below. Safe to disable if noisy.
    #
    # For scheduled runs `github.event.inputs.deployed_url` is always empty,
    # so the target falls back to the `REX_E2E_URL` *Actions variable* that
    # must be set at the repo level:
    #   Settings → Secrets and variables → Actions → Variables → New variable
    #     name:  REX_E2E_URL
    #     value: https://rex-os.up.railway.app   (or the current prod URL)
    # If that variable is unset, the "Require REX_E2E_URL" step below fails
    # fast with a readable error before Playwright is installed — previously
    # an unset value silently fell through to playwright.config.js's local
    # dev default (http://localhost:5173) and produced 14 confusing
    # ERR_CONNECTION_REFUSED failures.
    - cron: '17 */6 * * *'

# Silence the "Node.js 20 actions are deprecated" warning that GitHub now
# prints for checkout@v4 / setup-python@v5 / setup-node@v4. Forces those
# actions to run on Node 24, which they already support.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  smoke:
    name: Browser smoke against deployed URL
    runs-on: ubuntu-latest

    env:
      REX_E2E_URL: ${{ github.event.inputs.deployed_url || vars.REX_E2E_URL }}

    steps:
      - uses: actions/checkout@v4

      # Fail fast BEFORE npm install / playwright download if REX_E2E_URL
      # is empty. On workflow_dispatch the input is required so this branch
      # only fires for scheduled runs where the Actions variable is unset.
      # Without this guard, an unset URL falls through to playwright.config.js's
      # local dev default (http://localhost:5173) and every test crashes with
      # ERR_CONNECTION_REFUSED — slow and unreadable.
      - name: Require REX_E2E_URL
        run: |
          if [ -z "${REX_E2E_URL}" ]; then
            echo "ERROR: REX_E2E_URL is not set."
            echo ""
            echo "For scheduled runs, set the 'REX_E2E_URL' Actions variable"
            echo "in the repo settings: Settings → Secrets and variables →"
            echo "Actions → Variables → New variable."
            echo ""
            echo "Example value: https://rex-os.up.railway.app"
            exit 1
          fi
          echo "Targeting: $REX_E2E_URL"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium webkit

      - name: Run Playwright smoke against deployed URL
        working-directory: frontend
        env:
          REX_E2E_URL: ${{ env.REX_E2E_URL }}
        run: npx playwright test --reporter=list

      - name: Verify proxy / slash-redirect invariants against deployed backend
        if: env.REX_E2E_URL != ''
        run: |
          set -e
          URL="${REX_E2E_URL%/}"
          echo "Probing $URL"

          # 1. /api/health must be reachable and return 200
          code=$(curl -s -o /dev/null -w '%{http_code}' "$URL/api/health")
          echo "health: $code"
          [ "$code" = "200" ] || { echo "health not OK"; exit 1; }

          # 2. Hitting a trailing-slash route without slash should either
          #    succeed or redirect to an https:// Location — NEVER http://.
          #    This is the exact regression class we had under Railway.
          loc=$(curl -s -o /dev/null -D - -w '' "$URL/api/projects" | tr -d '\r' | awk 'BEGIN{IGNORECASE=1} /^location:/ {print $2}' || true)
          if [ -n "$loc" ]; then
            echo "redirect location: $loc"
            case "$loc" in
              http://*) echo "scheme downgraded to http"; exit 1 ;;
              https://*) echo "scheme preserved" ;;
              *) echo "relative / empty location — OK" ;;
            esac
          fi
